app:
  name: "aegis-docintel"
  version: "1.0.0"
  env: "development"
  log_level: "INFO"

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  max_upload_mb: 200
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8080"

storage:
  s3:
    endpoint: "${S3_ENDPOINT:http://localhost:9000}"
    access_key: "${S3_ACCESS_KEY:minioadmin}"
    secret_key: "${S3_SECRET_KEY:minioadmin}"
    bucket_raw: "aegis-raw"
    bucket_derived: "aegis-derived"
    bucket_images: "aegis-images"
    region: "us-east-1"

postgres:
  host: "${PG_HOST:localhost}"
  port: 5432
  user: "${PG_USER:aegis}"
  password: "${PG_PASSWORD:aegis_secret}"
  db: "aegis"
  pool_min: 5
  pool_max: 20

redis:
  url: "${REDIS_URL:redis://localhost:6379}"
  max_connections: 100
  decode_responses: true

kafka:
  bootstrap_servers: "${KAFKA_BROKERS:localhost:9092}"
  topic_ingest: "doc.ingest"
  topic_indexed: "doc.indexed"
  topic_failed: "doc.failed"
  topic_reindex: "doc.reindex"
  consumer_group: "aegis-workers"

milvus:
  host: "${MILVUS_HOST:localhost}"
  port: 19530
  collection_text: "chunks_text"
  collection_visual: "chunks_visual"

elasticsearch:
  hosts:
    - "${ES_HOST:http://localhost:9200}"
  index: "aegis_chunks_bm25"
  username: "${ES_USER:}"
  password: "${ES_PASSWORD:}"

embeddings:
  text_model: "BAAI/bge-large-en-v1.5"
  visual_model: "vidore/colpali"
  dimension: 1024
  batch_size: 32
  device: "cpu"
  normalize: true

chunking:
  strategy: "hierarchical"
  max_tokens: 800
  overlap: 100
  min_chunk_tokens: 50

retrieval:
  bm25_top_k: 50
  dense_top_k: 50
  visual_top_k: 20
  rerank_top_k: 12
  final_k: 8
  reranker: "BAAI/bge-reranker-v2-m3"
  mmr_lambda: 0.7

llm:
  provider: "openai"
  model: "gpt-4o-mini"
  endpoint: "${VLLM_ENDPOINT:}"
  api_key: "${OPENAI_API_KEY:}"
  max_input_tokens: 128000
  max_output_tokens: 4096
  temperature: 0.1
  top_p: 0.95
  stream: true

cache:
  semantic_threshold: 0.95
  ttl_seconds: 3600
  max_size_gb: 8

observability:
  otlp_endpoint: "${OTLP_ENDPOINT:http://localhost:4317}"
  metrics_port: 9090
  enable_tracing: true
  enable_metrics: true
