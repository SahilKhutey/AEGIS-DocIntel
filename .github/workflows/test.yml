name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AEGIS_ENV: test
      PYTHONPATH: .
      DISABLE_EXTERNAL_NETWORK: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio httpx

      - name: Run full test suite
        run: pytest tests/ -v --tb=short

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest_log.txt

  # Runs weekly or on manual dispatch to catch dependency drift
  scheduled-dependency-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-tools
        run: pip install pip-tools
      - name: Regenerate lock file and diff
        run: |
          pip-compile requirements.txt -o requirements.lock.new.txt || true
          diff requirements.txt requirements.lock.txt || true
