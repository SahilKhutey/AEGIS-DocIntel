name: Test Suite

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies (pinned lock file for reproducibility)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock.txt
          pip install pytest

      - name: Run full test suite
        run: pytest tests/ -q

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest_log.txt

  # Runs weekly to catch drift between requirements.txt's loose specifiers
  # and the pinned lock file, and to catch upstream breakage early
  # (e.g. a new library release breaking an existing test).
  scheduled-dependency-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pip-tools
        run: pip install pip-tools
      - name: Regenerate lock file and diff
        run: |
          pip-compile requirements.txt -o requirements.lock.new.txt
          diff requirements.lock.txt requirements.lock.new.txt || true
